[build]
  publish = "."
  functions = "netlify/functions"
  command = "echo 'No build step needed'"

[functions]
  node_bundler = "esbuild"

[functions."chat"]
  timeout = 30

[functions."save-cv"]
  timeout = 15

[functions."get-cv"]
  timeout = 10

[functions."admin"]
  timeout = 20

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[redirects]]
  from = "http://cvitae-py.netlify.app/*"
  to = "https://cvitae-py.netlify.app/:splat"
  status = 301
  force = true
