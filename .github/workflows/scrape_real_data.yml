name: Scrape Real Data - CVitae

on:
  schedule:
    - cron: '0 */6 * * *'  # Cada 6 horas
  workflow_dispatch:  # Permitir ejecución manual

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: dev/v2
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser
      
      - name: Run real data scraper
        run: |
          cd /home/runner/work/cvitae/cvitae
          python netlify/functions/scraper_real.py
      
      - name: Check if data changed
        id: check_changes
        run: |
          if git diff --quiet client/src/data/opportunities.ts; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "CVitae Data Scraper"
          git add client/src/data/opportunities.ts client/src/data/opportunities.json
          git commit -m "🔄 Update real opportunities data - $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin dev/v2
      
      - name: Log summary
        run: |
          echo "✅ Scraping completado"
          echo "Timestamp: $(date)"
          if [ -f client/src/data/opportunities.json ]; then
            TOTAL=$(grep -o '"total":' client/src/data/opportunities.json | wc -l)
            echo "Total de oportunidades: $TOTAL"
          fi
