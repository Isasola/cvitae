name: Daily Job Update
on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  update-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Actualizado a v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4 # Actualizado a v4
        with:
          node-version: '22' # Versión moderna y estable
          
      - name: Install pnpm
        uses: pnpm/action-setup@v2 # ESTO CORRIGE EL ERROR 127
        with:
          version: 8
          
      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile
        
      - name: Run Update Script
        run: pnpm netlify functions:invoke update-opportunities
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
